name: .NET Core CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    name: .NET on ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        cache: true

    - name: Restore
      run: dotnet restore --locked-mode

    - name: Build
      run: dotnet build SteamDatabaseBackend.sln -c Release --no-restore
